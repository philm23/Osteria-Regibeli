<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Terra e Mar – Casa dos Petiscos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css?v=20" />
</head>

<body>

<!-- SECÇÃO 1 – CAMARÃO -->
<section class="parallax-section">
  <img src="img/camarao.png" class="parallax layer-1">
  <div class="caption">Camarão fresco da nossa costa.</div>
</section>

<!-- SECÇÃO 2 – AMEIJOA -->
<section class="parallax-section">
  <img src="img/marisco.png" class="parallax layer-2">
  <div class="caption">Ameijoa apanhada no dia.</div>
</section>

<!-- SCRIPT DO PARALLAX -->
<script>
window.addEventListener("scroll", () => {
  const scrolled = window.scrollY;

  // Parallax médio: valores entre 0.2 e 0.5 são perfeitos
  document.querySelectorAll(".layer-1").forEach(el => {
    el.style.transform = `translate(-50%, ${scrolled * 0.25}px)`;
  });

  document.querySelectorAll(".layer-2").forEach(el => {
    el.style.transform = `translate(-50%, ${scrolled * 0.45}px)`;
  });
});
</script>

</body>
</html>
