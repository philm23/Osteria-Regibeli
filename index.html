<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Terra e Mar – Casa dos Petiscos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css?v=12" />
</head>

<body>

  <!-- SECÇÃO FIXA COM ROTAÇÃO -->
  <section id="intro">
    <h1 class="title">Terra e Mar</h1>
    <img src="img/banner-terra-mar.png" class="rotate-on-scroll">
  </section>

  <!-- ZONA DE SCROLL ARTIFICIAL (controla a rotação) -->
  <div class="scroll-zone"></div>

  <!-- ELEMENTO 1 – Camarão -->
  <section class="chapter" id="camarao">
    <img src="img/camarao.png" class="element">
    <p class="caption">Camarão fresco da nossa costa.</p>
  </section>

  <!-- ELEMENTO 2 – Ameijoa -->
  <section class="chapter" id="ameijoa">
    <img src="img/marisco.png" class="element">
    <p class="caption">Ameijoa apanhada no dia.</p>
  </section>

  <!-- ELEMENTO 3 – Carne -->
  <section class="chapter" id="carne">
    <img src="img/carne.png" class="element">
    <p class="caption">Carne grelhada no ponto.</p>
  </section>

  <!-- ELEMENTO 4 – Saladas -->
  <section class="chapter" id="saladas">
    <img src="img/saladas.png" class="element">
    <p class="caption">Frescura que completa o prato.</p>
  </section>

  <footer class="footer">
    <p>Casa dos Petiscos – Viseu</p>
  </footer>

  <!-- JAVASCRIPT FINAL -->
<script>
const img = document.querySelector(".rotate-on-scroll");
const zone = document.querySelector(".scroll-zone");
const intro = document.querySelector("#intro");
const camaraoImg = document.querySelector("#camarao .element");

window.addEventListener("scroll", () => {
  const rect = zone.getBoundingClientRect();
  const total = zone.offsetHeight - window.innerHeight;
  const progress = Math.min(Math.max((0 - rect.top) / total, 0), 1);

  const rotation = progress * 360;
  const scale = 1 + progress * 0.5;

  img.style.transform = `rotate(${rotation}deg) scale(${scale})`;

  if (progress >= 1) {
    intro.classList.add("fade-out");

    // limpar transform ANTES de aplicar fixed
    camaraoImg.style.transform = "none";

    // aplicar fixed e visible
    camaraoImg.classList.add("fixed");
    camaraoImg.classList.add("visible");
  }
});
</script>


</body>
</html>
